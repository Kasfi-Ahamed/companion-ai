
services:
  mongodb:
    image: mongo
    
    networks:
      - backend-net

  backend:
    build: .
    command: npm run test -- --coverage
    environment:
      - MONGO_URI=mongodb://mongodb:27017/companion-ai
      - NODE_ENV=test
      - JWT_SECRET=testsecret123
    depends_on:
      - mongodb
    networks:
      - backend-net

networks:
  backend-net:
