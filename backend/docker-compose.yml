services:
  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    container_name: backend-mongodb-1
    networks:
      - backend-net

  backend:
    build:
      context: .
    container_name: backend-backend-1
    environment:
      - MONGO_URI=mongodb://mongodb:27017/companion-ai-test
      - JWT_SECRET=testsecretkey123
    depends_on:
      - mongodb
    command: >
      sh -c "npm install &&
             npm run test -- --coverage"
    networks:
      - backend-net

networks:
  backend-net:
