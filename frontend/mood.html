<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CompanionAI - Mood Check</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header style="display: flex; justify-content: space-between; align-items: center;">
    <span>Check-in Mood</span>
    <div>
      <button onclick="toggleDarkMode()" aria-label="Toggle Dark Mode">🌓</button>
      <button onclick="location.href='logout.html'" style="background: #dc3545; color: white;" aria-label="Logout">Logout</button>
    </div>
  </header>

  <div class="container" style="text-align: center;">
    <p>How are you feeling today?</p>
    <button onclick="setMood('😊 Happy')" aria-label="Set mood to Happy">😊 Happy</button>
    <button onclick="setMood('😌 Calm')" aria-label="Set mood to Calm">😌 Calm</button>
    <button onclick="setMood('😢 Lonely')" aria-label="Set mood to Lonely">😢 Lonely</button>
    <button onclick="setMood('😟 Worried')" aria-label="Set mood to Worried">😟 Worried</button>
    <p id="confirmation" style="margin-top: 20px; font-weight: bold;"></p>
  </div>

  <div id="toast-container"></div>

  <script>
    function setMood(mood) {
      localStorage.setItem("mood", mood);
      document.getElementById("confirmation").textContent = `You're feeling: ${mood}`;
      showToast(`✅ Mood set to ${mood}`);
    }

    function showToast(msg) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = msg;
      document.getElementById("toast-container").appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function toggleDarkMode() {
      const isDark = document.body.classList.toggle("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
    }

    function applyDarkMode() {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }
    }

    let idleTimer;
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        localStorage.clear();
        window.location.href = "logout.html";
      }, 15 * 60 * 1000);
    }

    window.onload = () => {
      applyDarkMode();
      resetIdleTimer();
    };
    document.onmousemove = resetIdleTimer;
    document.onkeypress = resetIdleTimer;
  </script>
</body>
</html>
